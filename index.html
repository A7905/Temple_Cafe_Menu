<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Luxury Restaurant Menu</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Segoe UI",sans-serif;
    }

    body{
      background:#000;
      height:100vh;
      overflow:hidden;
    }

    .menu-container{
      width:100%;
      height:100vh;
      position:relative;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#000;
    }

    /* =========================
       IMAGE FULL SCREEN
    ========================== */

    .menu-image{
      width:100%;
      height:90vh;
      object-fit:contain;
      transition:opacity 0.3s ease;
      user-select:none;
      -webkit-user-drag:none;
    }

    /* =========================
       TOP PAGE COUNTER
    ========================== */

    .top-bar{
      position:absolute;
      top:18px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.45);
      backdrop-filter:blur(10px);
      color:white;
      padding:10px 22px;
      border-radius:50px;
      font-size:15px;
      letter-spacing:0.5px;
      z-index:10;
      border:1px solid rgba(255,255,255,0.08);
    }

    /* =========================
       BOTTOM BUTTONS
    ========================== */

    .controls{
      position:absolute;
      bottom:25px;
      width:100%;
      display:flex;
      justify-content:center;
      gap:18px;
      z-index:10;
    }

    .btn{
      padding:12px 26px;
      border-radius:50px;
      border:1px solid rgba(255,255,255,0.15);
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(8px);
      color:white;
      font-size:15px;
      cursor:pointer;
      transition:0.25s ease;
    }

    .btn:hover{
      background:rgba(255,255,255,0.18);
      transform:translateY(-2px);
    }

    /* =========================
       MOBILE
    ========================== */

    @media(max-width:768px){

      .menu-image{
        height:92vh;
      }

      .btn{
        padding:10px 18px;
        font-size:14px;
      }

      .top-bar{
        font-size:13px;
        padding:8px 18px;
      }

    }

  </style>
</head>

<body>

  <div class="menu-container">

    <!-- PAGE COUNTER -->

    <div class="top-bar" id="pageCount">
      Menu Page 1 / 19
    </div>

    <!-- MENU IMAGE -->

    <img 
      id="menuImage"
      class="menu-image"
      src="page1.jpg"
      alt="Restaurant Menu"
    >

    <!-- BUTTONS -->

    <div class="controls">

      <button class="btn" onclick="prevPage()">
        ← Previous
      </button>

      <button class="btn" onclick="nextPage()">
        Next →
      </button>

    </div>

  </div>

  <script>

    // =========================
    // TOTAL IMAGES
    // =========================

    const totalPages = 19;

    let currentPage = 1;

    const image = document.getElementById("menuImage");
    const pageCount = document.getElementById("pageCount");

    // =========================
    // UPDATE PAGE
    // =========================

    function updatePage(){

      image.style.opacity = 0;

      setTimeout(() => {

        image.src = `page${currentPage}.jpg`;

        pageCount.innerText =
          `Menu Page ${currentPage} / ${totalPages}`;

        image.style.opacity = 1;

      },150);

    }

    // =========================
    // NEXT PAGE
    // =========================

    function nextPage(){

      // Stops at page15.jpg

      if(currentPage < totalPages){

        currentPage++;
        updatePage();

      }

    }

    // =========================
    // PREVIOUS PAGE
    // =========================

    function prevPage(){

      // Stops at page1.jpg

      if(currentPage > 1){

        currentPage--;
        updatePage();

      }

    }

    // =========================
    // KEYBOARD SUPPORT
    // =========================

    document.addEventListener("keydown",(e)=>{

      if(e.key === "ArrowRight"){
        nextPage();
      }

      if(e.key === "ArrowLeft"){
        prevPage();
      }

    });

    // =================================================
    // MOBILE SWIPE SUPPORT
    // PINCH ZOOM WILL NOT CHANGE PAGE
    // =================================================

    let startX = 0;
    let startY = 0;

    let isPinching = false;

    document.addEventListener("touchstart",(e)=>{

      // Detect pinch zoom

      if(e.touches.length > 1){

        isPinching = true;
        return;

      }

      isPinching = false;

      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;

    });

    document.addEventListener("touchend",(e)=>{

      // Prevent page change while zooming

      if(isPinching){

        isPinching = false;
        return;

      }

      if(!e.changedTouches[0]) return;

      let endX = e.changedTouches[0].clientX;
      let endY = e.changedTouches[0].clientY;

      let diffX = startX - endX;
      let diffY = startY - endY;

      // Ignore vertical movement

      if(Math.abs(diffX) > Math.abs(diffY)){

        // LEFT SWIPE

        if(diffX > 50){
          nextPage();
        }

        // RIGHT SWIPE

        if(diffX < -50){
          prevPage();
        }

      }

    });

  </script>

</body>

</html>
